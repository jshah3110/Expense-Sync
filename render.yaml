services:
  # ── Backend: FastAPI ──────────────────────────────────────────────
  - type: web
    name: expensesync-api
    runtime: python
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PLAID_CLIENT_ID
        sync: false            # Set manually in Render dashboard
      - key: PLAID_SECRET
        sync: false
      - key: PLAID_ENV
        sync: false
      - key: SPLITWISE_CLIENT_ID
        sync: false
      - key: SPLITWISE_CLIENT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false            # Set to your frontend Render URL after deploy

  # ── Frontend: React/Vite Static Site ─────────────────────────────
  - type: web
    name: expensesync-ui
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false            # Set to your backend Render URL after deploy
